spring:
  config:
    import: "optional:file:../.env[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  application:
    name: cs2-analyzer-backend